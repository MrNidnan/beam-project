<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Beam Remote Display</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <div class="page-shell">
    <main class="projection-window">
      <section id="layout-canvas" class="layout-canvas" aria-live="polite">
        <div id="empty-state" class="empty-state">
          <p class="empty-state-kicker">No active layout items</p>
          <h1>Waiting for Beam</h1>
          <p>Enable the network display and configure mood layout rows to project text and cover art here.</p>
        </div>
      </section>
    </main>
  </div>

  <div id="text-measurer" class="text-measurer" aria-hidden="true"></div>

  <script type="module" src="/static/app.js"></script>
</body>
</html>
