name: Validate

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
      - feat/**
  pull_request:

jobs:
  validate-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create virtual environment
        shell: pwsh
        run: py -3.12 -m venv .venv

      - name: Install dependencies
        shell: pwsh
        run: |
          .\.venv\Scripts\python.exe -m pip install --upgrade pip setuptools wheel
          .\.venv\Scripts\python.exe -m pip install -r requirements.txt

      - name: Validate Windows entrypoint
        shell: pwsh
        run: |
          .\.venv\Scripts\python.exe -m py_compile beam.py

      - name: Smoke import platform-gated modules
        shell: pwsh
        run: |
          .\.venv\Scripts\python.exe .\scripts\smoke_imports.py

      - name: Smoke VirtualDJ query flow
        shell: pwsh
        run: |
          .\.venv\Scripts\python.exe .\scripts\smoke_virtualdj.py

  validate-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3 \
            python3-pip \
            python3-venv \
            python3-wxgtk4.0 \
            python3-mutagen \
            python3-numpy \
            python3-dbus

      - name: Validate Linux entrypoint
        run: |
          python3 -m py_compile beam.py

      - name: Smoke import platform-gated modules
        run: |
          python3 scripts/smoke_imports.py