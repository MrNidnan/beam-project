name: Validate

on:
  workflow_dispatch:
    inputs:
      run_renderer_soak:
        description: Run the optional layered renderer soak check
        required: false
        default: false
        type: boolean
  push:
    branches:
      - master
      - main
      - feat/**
  pull_request:

jobs:
  validate-windows:
    runs-on: windows-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create virtual environment
        shell: pwsh
        run: py -3.12 -m venv .venv

      - name: Install dependencies
        shell: pwsh
        run: |
          .\.venv\Scripts\python.exe -m pip install --upgrade pip setuptools wheel
          .\.venv\Scripts\python.exe -m pip install -r requirements.txt

      - name: Validate Windows entrypoint
        shell: pwsh
        run: |
          .\.venv\Scripts\python.exe -m py_compile beam.py

      - name: Run Windows smoke suite
        uses: ./.github/actions/run-python-smoke-suite
        with:
          platform: windows
          python-command: .\.venv\Scripts\python.exe

  validate-linux:
    runs-on: ubuntu-22.04

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3 \
            python3-pip \
            python3-venv \
            python3-wxgtk4.0 \
            python3-mutagen \
            python3-numpy \
            python3-dbus

      - name: Validate Linux entrypoint
        run: |
          python3 -m py_compile beam.py

      - name: Run Linux smoke suite
        uses: ./.github/actions/run-python-smoke-suite
        with:
          platform: linux
          python-command: python3

  renderer-soak-linux:
    if: github.event_name == 'workflow_dispatch' && inputs.run_renderer_soak
    continue-on-error: true
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3 \
            python3-pip \
            python3-venv \
            python3-wxgtk4.0 \
            python3-mutagen \
            python3-numpy \
            python3-dbus

      - name: Run layered renderer soak check
        run: |
          python3 scripts/soak_layered_repaints.py